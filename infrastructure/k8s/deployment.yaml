apiVersion: apps/v1
kind: Deployment
metadata:
  name: slughub-app
  labels:
    app: slughub
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: slughub
      tier: frontend
  template:
    metadata:
      labels:
        app: slughub
        tier: frontend
    spec:
      containers:
        - name: app
          image: slughub:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: slughub-config
            - secretRef:
                name: slughub-secret
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: slughub-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: db-data
              mountPath: /app/db
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: slughub-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slughub-redis
  labels:
    app: slughub
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slughub
      tier: cache
  template:
    metadata:
      labels:
        app: slughub
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
